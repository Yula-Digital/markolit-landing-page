<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1224 194" preserveAspectRatio="xMidYMid meet" width="100%" height="100%">
  <defs>
    <style>
      .menu-text {
        font-family: 'Heebo', 'Arial', sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #1A6147;
      }
      .menu-icon {
        fill: none;
        stroke: #1A6147;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .home-pill {
        fill: #DBE7D6;
      }
    </style>
  </defs>

  <!-- Background — match slice cream -->
  <rect x="0" y="0" width="1224" height="194" fill="#FCF9F6"/>

  <!-- Logo placeholder (right side) — actual logo overlaid via HTML element for cross-browser support -->

  <!-- Menu items: 5 items distributed 50→900 (right edge at 900, leaving room for logo)
       Each item: icon ABOVE, text BELOW
       RTL order (right→left visual):
         x=820: בית   (home)
         x=660: סניפים  (location)
         x=500: אודותינו (leaf)
         x=340: דרושים  (briefcase)
         x=160: מועדון הטבות (gift/star)
  -->

  <!-- בית — home with subtle pill behind -->
  <g transform="translate(820, 0)">
    <ellipse cx="0" cy="97" rx="56" ry="40" class="home-pill"/>
    <g transform="translate(0, 60)">
      <path class="menu-icon" d="M-12,4 L0,-8 L12,4 L12,14 L-12,14 Z"/>
      <rect class="menu-icon" x="-4" y="6" width="8" height="8"/>
    </g>
    <text class="menu-text" text-anchor="middle" x="0" y="115">בית</text>
  </g>

  <!-- סניפים — location pin -->
  <g transform="translate(660, 0)">
    <g transform="translate(0, 60)">
      <path class="menu-icon" d="M0,-10 C-7,-10 -12,-5 -12,2 C-12,9 0,18 0,18 C0,18 12,9 12,2 C12,-5 7,-10 0,-10 Z"/>
      <circle class="menu-icon" cx="0" cy="2" r="3.5"/>
    </g>
    <text class="menu-text" text-anchor="middle" x="0" y="115">סניפים</text>
  </g>

  <!-- אודותינו — leaf -->
  <g transform="translate(500, 0)">
    <g transform="translate(0, 60)">
      <path class="menu-icon" d="M-10,10 C-12,-2 -4,-12 10,-10 C12,4 4,12 -10,10 Z"/>
      <path class="menu-icon" d="M-10,10 L8,-8"/>
    </g>
    <text class="menu-text" text-anchor="middle" x="0" y="115">אודותינו</text>
  </g>

  <!-- דרושים — briefcase -->
  <g transform="translate(340, 0)">
    <g transform="translate(0, 60)">
      <rect class="menu-icon" x="-12" y="-3" width="24" height="16" rx="2"/>
      <path class="menu-icon" d="M-6,-3 L-6,-8 L6,-8 L6,-3"/>
      <line class="menu-icon" x1="-12" y1="4" x2="12" y2="4"/>
    </g>
    <text class="menu-text" text-anchor="middle" x="0" y="115">דרושים</text>
  </g>

  <!-- מועדון הטבות — gift/star -->
  <g transform="translate(160, 0)">
    <g transform="translate(0, 60)">
      <polygon class="menu-icon" points="0,-12 3.5,-3.5 12,-3.5 5,2.5 7.5,11 0,6 -7.5,11 -5,2.5 -12,-3.5 -3.5,-3.5"/>
    </g>
    <text class="menu-text" text-anchor="middle" x="0" y="115">מועדון הטבות</text>
  </g>
</svg>
