name: Deploy landing page to Plesk (markolitly.co.il)

on:
  push:
    branches: [main]
    paths:
      - 'production_deploy/**'
      - '.github/workflows/deploy-plesk.yml'
  workflow_dispatch:   # מאפשר הרצה ידנית מטאב Actions

concurrency:
  group: deploy-plesk
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: אימות שה-Secrets הנדרשים מוגדרים
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ];   then echo "::error title=חסר Secret::הגדר FTP_SERVER ב-Settings → Secrets → Actions";   exit 1; fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then echo "::error title=חסר Secret::הגדר FTP_USERNAME"; exit 1; fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then echo "::error title=חסר Secret::הגדר FTP_PASSWORD"; exit 1; fi

      - name: פריסה אוטומטית ב-FTPS אל Plesk
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./production_deploy/
          # ↓ יעד בשרת. ברוב חשבונות Plesk זהו httpdocs/.
          #   אם חשבון ה-FTP שלך כבר ממופה ישירות לתוך httpdocs — שנה ל: ./
          server-dir: ./httpdocs/
          # אין dangerous-clean-slate — לא מוחק קבצים קיימים בריצה הראשונה
